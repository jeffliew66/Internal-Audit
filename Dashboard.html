<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura IA Firm Dashboard</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111827;
      --surface-2: #172033;
      --surface-3: #1f2a44;
      --line: #2b3854;
      --text: #e5edf8;
      --muted: #94a3b8;
      --soft: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #fb7185;
      --critical: #ef4444;
      --sidebar: 280px;
      --top: 60px;
      --radius: 16px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    button, input, select { font: inherit; color: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-rows: var(--top) 1fr;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 18, 32, .95);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(56,189,248,.22);
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-top: 2px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search {
      width: 330px;
      max-width: 42vw;
      border: 1px solid var(--line);
      background: #0f172a;
      border-radius: 999px;
      padding: 10px 13px;
      outline: none;
    }

    .sidebar {
      grid-row: 2;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #0f172a, #111827);
      padding: 16px 12px;
      overflow: auto;
    }

    .nav-section {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin: 18px 10px 8px;
    }

    .nav-section:first-child { margin-top: 4px; }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 5px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--soft);
      text-align: left;
    }

    .nav-btn:hover { background: rgba(255,255,255,.035); border-color: rgba(255,255,255,.06); }
    .nav-btn.active { background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.3); color: white; }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .nav-ico { width: 22px; text-align: center; opacity: .95; }
    .nav-count {
      color: var(--muted);
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      background: rgba(255,255,255,.025);
    }

    main {
      grid-row: 2;
      overflow: auto;
      padding: 24px 28px 52px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .title h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -.04em;
    }

    .title p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 850px;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 11px;
      padding: 9px 13px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white;
    }

    .btn.ghost { background: transparent; }
    .btn.small { font-size: 12px; padding: 6px 9px; border-radius: 9px; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(135px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .kpi, .panel, .client-card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 18px 42px rgba(0,0,0,.13);
    }

    .kpi {
      padding: 16px;
      min-height: 98px;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .kpi .value {
      margin-top: 8px;
      font-size: 29px;
      font-weight: 850;
      letter-spacing: -.05em;
    }

    .kpi .note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 14px;
      align-items: start;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      padding: 16px;
      margin-bottom: 14px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -.01em;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr repeat(4, minmax(130px, .8fr));
      gap: 10px;
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .field input, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f172a;
      padding: 9px 10px;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 13px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: var(--surface-2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 750;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    td strong { color: white; }
    .muted { color: var(--muted); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 11px;
      color: var(--soft);
      white-space: nowrap;
      background: rgba(255,255,255,.025);
    }

    .pill.high, .pill.critical, .pill.overdue {
      border-color: rgba(251,113,133,.45);
      color: #fecdd3;
      background: rgba(251,113,133,.07);
    }

    .pill.medium, .pill.due-soon, .pill.in-progress {
      border-color: rgba(251,191,36,.45);
      color: #fde68a;
      background: rgba(251,191,36,.06);
    }

    .pill.low, .pill.on-track, .pill.active, .pill.completed {
      border-color: rgba(52,211,153,.42);
      color: #bbf7d0;
      background: rgba(52,211,153,.06);
    }

    .pill.blue, .pill.planning {
      border-color: rgba(56,189,248,.45);
      color: #bae6fd;
      background: rgba(56,189,248,.08);
    }

    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 13px;
    }

    .client-card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 13px;
      min-height: 238px;
    }

    .client-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .client-name {
      margin: 0;
      font-size: 17px;
      letter-spacing: -.02em;
    }

    .client-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.45;
    }

    .client-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: auto;
    }

    .mini-stat {
      border: 1px solid var(--line);
      background: #0f172a;
      border-radius: 12px;
      padding: 10px;
    }

    .mini-stat .num {
      font-weight: 800;
      font-size: 19px;
      letter-spacing: -.03em;
    }

    .mini-stat .txt {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #0f172a;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .view-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .tab.active {
      color: white;
      background: rgba(56,189,248,.12);
      border-color: rgba(56,189,248,.35);
    }

    .timeline {
      display: grid;
      gap: 9px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0f172a;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.02);
    }

    @media (max-width: 1180px) {
      .kpis { grid-template-columns: repeat(3, 1fr); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 780px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      main { padding: 18px; }
      .search { display: none; }
      .kpis { grid-template-columns: 1fr 1fr; }
      .filters { grid-template-columns: 1fr; }
      .page-head { flex-direction: column; }
      .timeline-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">IA</div>
      <div>
        Aura IA Firm Dashboard
        <small>Portfolio control center for internal audit service providers</small>
      </div>
    </div>
    <div class="top-actions">
      <input class="search" id="globalSearch" placeholder="Search client, industry, audit, finding..." />
      <a class="btn ghost small" href="/" title="Single-client internal audit lifecycle workspace">IA workspace</a>
      <button class="btn ghost small" id="resetDemoBtn">Reset demo</button>
      <button class="btn primary small" id="addClientBtn">+ Add client</button>
    </div>
  </header>

  <aside class="sidebar" id="sidebar"></aside>
  <main id="root"></main>
</div>

<script>

      upcoming: [
        { date: '2026-02-20', item: 'IT access control planning approval', status: 'Due soon' },
        { date: '2026-03-08', item: 'AML controls walkthrough', status: 'Planning' }
      ]
    },
    {
      id: 'meranti-retail',
      name: 'Meranti Retail Group',
      industry: 'Retail',
      country: 'Malaysia',
      relationshipOwner: 'Priya Dev',
      clientSponsor: 'CEO',
      riskTier: 'Medium',
      status: 'Active',
      contract: 'Retainer',
      workspaceUrl: '/index.html?clientId=meranti-retail',
      activeAudits: 1,
      plannedAudits: 3,
      openFindings: 6,
      highFindings: 1,
      overdueActions: 0,
      reportsInDraft: 0,
      planCompletion: 68,
      nextMilestone: 'Inventory follow-up validation',
      lastActivity: 'Evidence uploaded for stock count reconciliation action',
      upcoming: [
        { date: '2026-02-11', item: 'Inventory closure validation', status: 'On track' }
      ]
    },
    {
      id: 'nusa-healthcare',
      name: 'Nusa Healthcare Network',
      industry: 'Healthcare',
      country: 'Malaysia',
      relationshipOwner: 'Aina Rahman',
      clientSponsor: 'COO',
      riskTier: 'Medium',
      status: 'Active',
      contract: 'Retainer',
      workspaceUrl: '/index.html?clientId=nusa-healthcare',
      activeAudits: 2,
      plannedAudits: 6,
      openFindings: 11,
      highFindings: 2,
      overdueActions: 3,
      reportsInDraft: 1,
      planCompletion: 42,
      nextMilestone: 'Patient data privacy fieldwork starts',
      lastActivity: 'Risk assessment updated for data privacy audit universe',
      upcoming: [
        { date: '2026-02-18', item: 'Data privacy audit kick-off', status: 'Planning' }
      ]
    },
    {
      id: 'satria-manufacturing',
      name: 'Satria Manufacturing Sdn Bhd',
      industry: 'Manufacturing',
      country: 'Malaysia',
      relationshipOwner: 'Jason Tan',
      clientSponsor: 'CFO',
      riskTier: 'Low',
      status: 'Onboarding',
      contract: 'Project-based',
      workspaceUrl: '/index.html?clientId=satria-manufacturing',
      activeAudits: 0,
      plannedAudits: 2,
      openFindings: 0,
      highFindings: 0,
      overdueActions: 0,
      reportsInDraft: 0,
      planCompletion: 0,
      nextMilestone: 'Initial audit universe workshop',
      lastActivity: 'Client workspace created',
      upcoming: [
        { date: '2026-02-25', item: 'Audit universe workshop', status: 'Planning' }
      ]
    }
  ];
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { view: 'overview', layout: 'cards', clients: defaultClients(), filters: { search: '', risk: 'all', owner: 'all', status: 'all', contract: 'all' } };
    const parsed = JSON.parse(raw);
    return {
      view: parsed.view || 'overview',
      layout: parsed.layout || 'cards',
      clients: Array.isArray(parsed.clients) ? parsed.clients : defaultClients(),
      filters: Object.assign({ search: '', risk: 'all', owner: 'all', status: 'all', contract: 'all' }, parsed.filters || {})
    };
  } catch (e) {
    return { view: 'overview', layout: 'cards', clients: defaultClients(), filters: { search: '', risk: 'all', owner: 'all', status: 'all', contract: 'all' } };
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function slug(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
}

function pill(value) {
  const cls = slug(value);
  return `<span class="pill ${esc(cls)}">${esc(value)}</span>`;
}

function setView(view) {
  state.view = view;
  saveState();
  render();
}

function setLayout(layout) {
  state.layout = layout;
  saveState();
  render();
}

function getOwners() {
  return [...new Set(state.clients.map(c => c.relationshipOwner).filter(Boolean))];
}

function filteredClients() {
  const f = state.filters;
  const q = String(f.search || '').toLowerCase().trim();
  return state.clients.filter(c => {
    const haystack = [c.name, c.industry, c.country, c.relationshipOwner, c.clientSponsor, c.riskTier, c.status, c.contract, c.nextMilestone].join(' ').toLowerCase();
    if (q && !haystack.includes(q)) return false;
    if (f.risk !== 'all' && c.riskTier !== f.risk) return false;
    if (f.owner !== 'all' && c.relationshipOwner !== f.owner) return false;
    if (f.status !== 'all' && c.status !== f.status) return false;
    if (f.contract !== 'all' && c.contract !== f.contract) return false;
    return true;
  });
}

function portfolioMetrics(list = state.clients) {
  return {
    clients: list.length,
    activeAudits: list.reduce((n, c) => n + Number(c.activeAudits || 0), 0),
    plannedAudits: list.reduce((n, c) => n + Number(c.plannedAudits || 0), 0),
    openFindings: list.reduce((n, c) => n + Number(c.openFindings || 0), 0),
    highFindings: list.reduce((n, c) => n + Number(c.highFindings || 0), 0),
    overdueActions: list.reduce((n, c) => n + Number(c.overdueActions || 0), 0),
    draftReports: list.reduce((n, c) => n + Number(c.reportsInDraft || 0), 0),
    highRiskClients: list.filter(c => c.riskTier === 'High').length
  };
}

function renderSidebar() {
  const metrics = portfolioMetrics();
  const nav = [
    { group: 'Firm portfolio', items: [
      ['overview', '◈', 'Overview', metrics.clients],
      ['clients', '⌂', 'Internal audit clients', metrics.clients],
      ['calendar', '☷', 'Portfolio calendar', metrics.activeAudits]
    ]},
    { group: 'Cross-client monitoring', items: [
      ['findings', '●', 'Findings across clients', metrics.openFindings],
      ['followup', '↻', 'Overdue follow-up', metrics.overdueActions],
      ['reports', '▤', 'Reports in progress', metrics.draftReports]
    ]},
    { group: 'Firm management', items: [
      ['team', '◎', 'Team workload', getOwners().length],
      ['settings', '⚙', 'Firm settings', '']
    ]}
  ];

  sidebar.innerHTML = nav.map(section => `
    <div class="nav-section">${section.group}</div>
    ${section.items.map(([key, ico, label, count]) => `
      <button class="nav-btn ${state.view === key ? 'active' : ''}" onclick="setView('${key}')">
        <span class="nav-left"><span class="nav-ico">${ico}</span><span>${label}</span></span>
        ${count !== '' ? `<span class="nav-count">${count}</span>` : ''}
      </button>`).join('')}
  `).join('');
}

function pageHead(title, subtitle, actions = '') {
  return `
    <div class="page-head">
      <div class="title">
        <h1>${title}</h1>
        <p>${subtitle}</p>
      </div>
      <div class="toolbar">${actions}</div>
    </div>`;
}

function renderKpis(list = state.clients) {
  const m = portfolioMetrics(list);
  const items = [
    ['Clients', m.clients, 'Internal audit clients'],
    ['Active audits', m.activeAudits, 'Currently in planning / fieldwork'],
    ['Planned audits', m.plannedAudits, 'Approved or proposed'],
    ['Open findings', m.openFindings, 'Across all clients'],
    ['High findings', m.highFindings, 'High-risk findings'],
    ['Overdue actions', m.overdueActions, 'Needs escalation']
  ];
  return `<div class="kpis">${items.map(([label, value, note]) => `
    <div class="kpi">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
      <div class="note">${note}</div>
    </div>`).join('')}</div>`;
}

function renderFilters() {
  const owners = getOwners();
  const statuses = [...new Set(state.clients.map(c => c.status))];
  const contracts = [...new Set(state.clients.map(c => c.contract))];
  return `
    <div class="filters">
      <div class="field">
        <label>Search client</label>
        <input id="filterSearch" value="${esc(state.filters.search)}" placeholder="Client, industry, milestone..." />
      </div>
      <div class="field">
        <label>Risk tier</label>
        <select id="filterRisk">
          ${option('all', 'All risks', state.filters.risk)}
          ${option('High', 'High', state.filters.risk)}
          ${option('Medium', 'Medium', state.filters.risk)}
          ${option('Low', 'Low', state.filters.risk)}
        </select>
      </div>
      <div class="field">
        <label>Relationship owner</label>
        <select id="filterOwner">
          ${option('all', 'All owners', state.filters.owner)}
          ${owners.map(o => option(o, o, state.filters.owner)).join('')}
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="filterStatus">
          ${option('all', 'All statuses', state.filters.status)}
          ${statuses.map(s => option(s, s, state.filters.status)).join('')}
        </select>
      </div>
      <div class="field">
        <label>Contract</label>
        <select id="filterContract">
          ${option('all', 'All contracts', state.filters.contract)}
          ${contracts.map(c => option(c, c, state.filters.contract)).join('')}
        </select>
      </div>
    </div>`;
}

function option(value, label, selected) {
  return `<option value="${esc(value)}" ${value === selected ? 'selected' : ''}>${esc(label)}</option>`;
}

function attachFilters() {
  const filterSearch = document.getElementById('filterSearch');
  const filterRisk = document.getElementById('filterRisk');
  const filterOwner = document.getElementById('filterOwner');
  const filterStatus = document.getElementById('filterStatus');
  const filterContract = document.getElementById('filterContract');

  if (!filterSearch) return;

  filterSearch.oninput = () => { state.filters.search = filterSearch.value; saveState(); render(); };
  filterRisk.onchange = () => { state.filters.risk = filterRisk.value; saveState(); render(); };
  filterOwner.onchange = () => { state.filters.owner = filterOwner.value; saveState(); render(); };
  filterStatus.onchange = () => { state.filters.status = filterStatus.value; saveState(); render(); };
  filterContract.onchange = () => { state.filters.contract = filterContract.value; saveState(); render(); };
}

function renderClientCards(list) {
  if (!list.length) return `<div class="empty">No clients match the current filters.</div>`;

  return `<div class="client-grid">${list.map(c => `
    <article class="client-card">
      <div class="client-top">
        <div>
          <h3 class="client-name">${esc(c.name)}</h3>
          <div class="client-meta">${esc(c.industry)} · ${esc(c.country)}<br>Owner: ${esc(c.relationshipOwner)} · Sponsor: ${esc(c.clientSponsor)}</div>
        </div>
        ${pill(c.riskTier)}
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:7px;font-size:12px;color:var(--muted)">
          <span>Annual plan completion</span><span>${Number(c.planCompletion || 0)}%</span>
        </div>
        <div class="progress"><span style="width:${Number(c.planCompletion || 0)}%"></span></div>
      </div>

      <div class="client-stats">
        <div class="mini-stat"><div class="num">${c.activeAudits}</div><div class="txt">Active audits</div></div>
        <div class="mini-stat"><div class="num">${c.openFindings}</div><div class="txt">Open findings</div></div>
        <div class="mini-stat"><div class="num">${c.overdueActions}</div><div class="txt">Overdue</div></div>
      </div>

      <div class="client-meta"><strong style="color:var(--soft)">Next:</strong> ${esc(c.nextMilestone)}<br><strong style="color:var(--soft)">Latest:</strong> ${esc(c.lastActivity)}</div>

      <div class="toolbar">
        <a class="btn primary small" href="${esc(c.workspaceUrl)}">Open client workspace</a>
        <button class="btn ghost small" onclick="openClientSummary('${esc(c.id)}')">Summary</button>
      </div>
    </article>`).join('')}</div>`;
}

function renderClientTable(list) {
  if (!list.length) return `<div class="empty">No clients match the current filters.</div>`;

  const rows = list.map(c => `
    <tr>
      <td><strong>${esc(c.name)}</strong><div class="muted">${esc(c.industry)} · ${esc(c.country)}</div></td>
      <td>${pill(c.riskTier)}<br><span class="muted">${esc(c.status)}</span></td>
      <td>${esc(c.relationshipOwner)}</td>
      <td>${esc(c.contract)}</td>
      <td>${c.activeAudits}</td>
      <td>${c.plannedAudits}</td>
      <td>${c.openFindings}</td>
      <td>${c.highFindings}</td>
      <td>${c.overdueActions ? pill('Overdue ' + c.overdueActions) : pill('On track')}</td>
      <td>${c.planCompletion}%<div class="progress" style="margin-top:6px"><span style="width:${c.planCompletion}%"></span></div></td>
      <td style="white-space:nowrap"><a class="btn primary small" href="${esc(c.workspaceUrl)}">Open</a> <button class="btn ghost small" onclick="openClientSummary('${esc(c.id)}')">Summary</button></td>
    </tr>`).join('');

  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Client</th><th>Risk / status</th><th>Owner</th><th>Contract</th><th>Active</th><th>Planned</th><th>Open</th><th>High</th><th>Follow-up</th><th>Plan</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderOverview() {
  const list = filteredClients();
  const actions = `<button class="btn primary" onclick="setView('clients')">View clients</button><button class="btn ghost" onclick="setView('followup')">Overdue follow-up</button>`;
  return pageHead('Firm dashboard', 'Portfolio-level view for an internal audit firm managing multiple internal audit clients. Use this page to monitor client status, then enter each client workspace.', actions) +
    renderKpis(state.clients) +
    `<div class="grid-2">
      <section class="panel">
        <div class="panel-title"><h2>Priority clients</h2><span>High risk or overdue actions</span></div>
        ${renderClientCards(state.clients.filter(c => c.riskTier === 'High' || c.overdueActions > 0).slice(0, 4))}
      </section>
      <section class="panel">
        <div class="panel-title"><h2>Upcoming portfolio milestones</h2><span>Next 30–60 days</span></div>
        ${renderTimeline()}
      </section>
    </div>
    <div class="panel">
      <div class="panel-title"><h2>Client portfolio snapshot</h2><span>${list.length} shown</span></div>
      ${renderClientTable(list.slice(0, 8))}
    </div>`;
}

function renderClientsPage() {
  const list = filteredClients();
  const actions = `<button class="btn ${state.layout === 'cards' ? 'primary' : 'ghost'}" onclick="setLayout('cards')">Cards</button><button class="btn ${state.layout === 'table' ? 'primary' : 'ghost'}" onclick="setLayout('table')">Table</button><button class="btn ghost" onclick="clearFilters()">Clear filters</button>`;
  return pageHead('Internal audit clients', 'Navigation panel for all companies audited by the internal audit firm. Each client opens into its own internal audit workspace.', actions) +
    renderFilters() +
    renderKpis(list) +
    `<div class="panel">
      <div class="panel-title"><h2>Client navigation</h2><span>${list.length} clients found</span></div>
      ${state.layout === 'cards' ? renderClientCards(list) : renderClientTable(list)}
    </div>`;
}

function renderTimeline() {
  const events = state.clients.flatMap(c => (c.upcoming || []).map(e => ({ client: c.name, clientId: c.id, ...e })));
  events.sort((a,b) => String(a.date).localeCompare(String(b.date)));
  return `<div class="timeline">${events.slice(0, 8).map(e => `
    <div class="timeline-item">
      <div class="muted">${esc(e.date)}</div>
      <div><strong>${esc(e.item)}</strong><div class="muted">${esc(e.client)}</div></div>
      <div>${pill(e.status)}</div>
    </div>`).join('')}</div>`;
}

function renderCalendarPage() {
  return pageHead('Portfolio calendar', 'Upcoming audit milestones across all clients: planning approvals, fieldwork starts, draft reports, committee packs, and follow-up deadlines.', `<button class="btn primary">+ Milestone</button>`) +
    `<div class="panel"><div class="panel-title"><h2>Upcoming milestones</h2><span>Across all clients</span></div>${renderTimeline()}</div>`;
}

function renderFindingsPage() {
  const clients = filteredClients();
  const rows = clients.map(c => `
    <tr>
      <td><strong>${esc(c.name)}</strong><div class="muted">${esc(c.industry)}</div></td>
      <td>${pill(c.riskTier)}</td>
      <td>${c.openFindings}</td>
      <td>${c.highFindings}</td>
      <td>${c.overdueActions}</td>
      <td>${esc(c.relationshipOwner)}</td>
      <td><a class="btn primary small" href="${esc(c.workspaceUrl)}#findings">Open findings</a></td>
    </tr>`).join('');
  return pageHead('Findings across clients', 'Portfolio view of open and high-risk findings by client. Use this to identify which clients need attention first.', `<button class="btn ghost" onclick="setView('clients')">Back to clients</button>`) +
    renderFilters() +
    `<div class="panel"><div class="panel-title"><h2>Findings summary by client</h2><span>${clients.length} clients</span></div>${table(['Client','Risk','Open findings','High findings','Overdue actions','Owner',''], rows)}</div>`;
}

function renderFollowupPage() {
  const clients = filteredClients().filter(c => c.overdueActions > 0 || c.openFindings > 0);
  const rows = clients.map(c => `
    <tr>
      <td><strong>${esc(c.name)}</strong><div class="muted">${esc(c.nextMilestone)}</div></td>
      <td>${esc(c.relationshipOwner)}</td>
      <td>${c.openFindings}</td>
      <td>${c.overdueActions ? pill('Overdue ' + c.overdueActions) : pill('On track')}</td>
      <td>${c.highFindings}</td>
      <td><a class="btn primary small" href="${esc(c.workspaceUrl)}#followup">Open follow-up</a></td>
    </tr>`).join('');
  return pageHead('Overdue follow-up', 'Cross-client remediation monitoring for management action plans, overdue items, and closure validation.', `<button class="btn primary">Send reminder batch</button>`) +
    renderFilters() +
    `<div class="panel"><div class="panel-title"><h2>Follow-up tracker by client</h2><span>${clients.length} clients with open follow-up</span></div>${table(['Client','Owner','Open findings','Overdue','High findings',''], rows)}</div>`;
}

function renderReportsPage() {
  const clients = filteredClients().filter(c => c.reportsInDraft > 0 || c.activeAudits > 0);
  const rows = clients.map(c => `
    <tr>
      <td><strong>${esc(c.name)}</strong><div class="muted">${esc(c.industry)}</div></td>
      <td>${c.reportsInDraft}</td>
      <td>${c.activeAudits}</td>
      <td>${esc(c.nextMilestone)}</td>
      <td>${esc(c.relationshipOwner)}</td>
      <td><a class="btn primary small" href="${esc(c.workspaceUrl)}#reports">Open reports</a></td>
    </tr>`).join('');
  return pageHead('Reports in progress', 'Track draft reports, reports awaiting management response, and final reports ready for issue across all clients.', `<button class="btn primary">Generate report tracker</button>`) +
    renderFilters() +
    `<div class="panel"><div class="panel-title"><h2>Report status by client</h2><span>${clients.length} clients</span></div>${table(['Client','Draft reports','Active audits','Next milestone','Owner',''], rows)}</div>`;
}

function renderTeamPage() {
  const owners = getOwners();
  const rows = owners.map(owner => {
    const clients = state.clients.filter(c => c.relationshipOwner === owner);
    const m = portfolioMetrics(clients);
    return `<tr><td><strong>${esc(owner)}</strong></td><td>${clients.length}</td><td>${m.activeAudits}</td><td>${m.openFindings}</td><td>${m.overdueActions}</td><td>${m.highFindings}</td></tr>`;
  }).join('');
  return pageHead('Team workload', 'Relationship owner workload across internal audit clients, active audits, open findings, and overdue follow-up.', `<button class="btn primary">Assign client</button>`) +
    `<div class="panel"><div class="panel-title"><h2>Workload by owner</h2><span>${owners.length} owners</span></div>${table(['Owner','Clients','Active audits','Open findings','Overdue actions','High findings'], rows)}</div>`;
}

function renderSettingsPage() {
  return pageHead('Firm settings', 'Configure portfolio-level settings for the internal audit firm, including client onboarding, workspace templates, staff roles, methodology, and reporting pack formats.', `<button class="btn primary">Save settings</button>`) +
    `<div class="grid-3">
      ${['Client onboarding checklist','Default workspace template','Risk scoring model','Report pack template','Staff roles & permissions','Data retention & archive'].map(item => `
        <section class="client-card">
          <h3 class="client-name">${item}</h3>
          <p class="client-meta">Configure ${item.toLowerCase()} for all internal audit clients managed by the firm.</p>
          <button class="btn ghost small">Configure</button>
        </section>`).join('')}
    </div>`;
}

function table(headers, rowsHtml) {
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rowsHtml || `<tr><td colspan="${headers.length}" class="muted">No records.</td></tr>`}</tbody></table></div>`;
}

function clearFilters() {
  state.filters = { search: '', risk: 'all', owner: 'all', status: 'all', contract: 'all' };
  saveState();
  render();
}

function openClientSummary(id) {
  const c = state.clients.find(x => x.id === id);
  if (!c) return;
  alert(`${c.name}\n\nRisk: ${c.riskTier}\nActive audits: ${c.activeAudits}\nOpen findings: ${c.openFindings}\nOverdue actions: ${c.overdueActions}\n\nOpen workspace: ${c.workspaceUrl}`);
}

function addClient() {
  const name = prompt('Client name');
  if (!name) return;
  const id = slug(name) || 'client-' + Date.now();
  state.clients.push({
    id,
    name,
    industry: 'New client',
    country: 'Malaysia',
    relationshipOwner: getOwners()[0] || 'Unassigned',
    clientSponsor: 'To be confirmed',
    riskTier: 'Medium',
    status: 'Onboarding',
    contract: 'Project-based',
    workspaceUrl: `/index.html?clientId=${id}`,
    activeAudits: 0,
    plannedAudits: 0,
    openFindings: 0,
    highFindings: 0,
    overdueActions: 0,
    reportsInDraft: 0,
    planCompletion: 0,
    nextMilestone: 'Client onboarding',
    lastActivity: 'Client created',
    upcoming: []
  });
  state.view = 'clients';
  saveState();
  render();
}

function resetDemo() {
  if (!confirm('Reset demo dashboard data?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  render();
}

function render() {
  renderSidebar();
  const routes = {
    overview: renderOverview,
    clients: renderClientsPage,
    calendar: renderCalendarPage,
    findings: renderFindingsPage,
    followup: renderFollowupPage,
    reports: renderReportsPage,
    team: renderTeamPage,
    settings: renderSettingsPage
  };
  const fn = routes[state.view] || renderOverview;
  document.getElementById('root').innerHTML = fn();
  attachFilters();
}

document.getElementById('addClientBtn').onclick = addClient;
document.getElementById('resetDemoBtn').onclick = resetDemo;
document.getElementById('globalSearch').oninput = (event) => {
  state.filters.search = event.target.value;
  state.view = 'clients';
  saveState();
  render();
};

render();
</script>
</body>
</html>
