<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura Audit — Interactive Workspace</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #161d26;
      --panel2: #1c2530;
      --border: #2a3544;
      --text: #e8eef6;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --danger: #f87171;
      --ok: #34d399;
      --top-h: 52px;
      --sidebar-w: 240px;
      --radius: 10px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); background: var(--bg); color: var(--text); }
    a { color: var(--accent); text-decoration: none; }
    button, input, select, textarea { font: inherit; color: inherit; }
    button {
      cursor: pointer; border: 1px solid var(--border); background: var(--panel2);
      border-radius: 8px; padding: 8px 12px;
    }
    button.primary { background: linear-gradient(135deg, #0ea5e9, #6366f1); border-color: transparent; color: #fff; }
    button.ghost { background: transparent; border-color: var(--border); }
    button.danger { border-color: rgba(248,113,113,.45); color: #fecaca; background: rgba(248,113,113,.08); }
    button.small { padding: 4px 8px; font-size: 12px; border-radius: 6px; }
    input, select, textarea {
      width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: #0b1118; color: var(--text);
    }
    textarea { min-height: 88px; resize: vertical; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .field { margin-bottom: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

    #app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: var(--top-h) 1fr;
      height: 100vh;
    }
    .topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid var(--border); background: rgba(15,20,25,.92); backdrop-filter: blur(8px);
    }
    .brand { font-weight: 700; letter-spacing: .02em; }
    .brand span { color: var(--muted); font-weight: 500; margin-left: 8px; font-size: 13px; }
    .sidebar {
      grid-row: 2;
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 12px;
      overflow: auto;
    }
    .nav-btn {
      width: 100%; text-align: left; margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
      background: transparent;
    }
    .nav-btn.active { background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.35); }
    main {
      grid-row: 2;
      overflow: auto;
      padding: 18px 20px 40px;
    }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .page-head h1 { margin: 0; font-size: 22px; }
    .muted { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
    }
    .card h3 { margin: 0 0 6px; font-size: 14px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .stat { font-size: 26px; font-weight: 700; }

    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }

    table.data {
      width: 100%; border-collapse: collapse; font-size: 13px;
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    table.data th, table.data td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; background: var(--panel2); }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr:hover td { background: rgba(255,255,255,.02); }

    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--border); color: var(--muted);
    }
    .pill.high { border-color: rgba(248,113,113,.45); color: #fecaca; }
    .pill.medium { border-color: rgba(251,191,36,.45); color: #fde68a; }
    .pill.low { border-color: rgba(52,211,153,.45); color: #a7f3d0; }

    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .tab {
      padding: 8px 12px; border-radius: 8px; border: 1px solid transparent; background: transparent; color: var(--muted);
    }
    .tab.active { border-color: var(--border); background: var(--panel2); color: var(--text); }

    .rail-layout { display: grid; grid-template-columns: 220px 1fr; gap: 18px; align-items: start; }
    @media (max-width: 980px) { .rail-layout { grid-template-columns: 1fr; } }
    .rail {
      position: sticky; top: 12px;
      border: 1px solid var(--border); border-radius: var(--radius); background: var(--panel); padding: 8px;
    }
    .rail button {
      width: 100%; text-align: left; margin-bottom: 4px; background: transparent;
    }
    .rail button.active { background: rgba(129,140,248,.14); border-color: rgba(129,140,248,.35); }

    .section-panel {
      border: 1px solid var(--border); border-radius: var(--radius); background: var(--panel); padding: 16px; margin-bottom: 14px;
    }
    .section-panel h2 { margin: 0 0 12px; font-size: 15px; }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center;
      padding: 16px; z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%); max-height: 90vh; overflow: auto;
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }
    .modal.modal-wide { width: min(840px, 100%); }
    .table-scroll { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    .table-scroll table.data { margin: 0; border-radius: 0; border: none; }
    .pill-warn { border-color: rgba(251,191,36,.55); color: #fde68a; }
    .pill-urgent { border-color: rgba(248,113,113,.55); color: #fecaca; }
    .nav-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted);
      margin: 14px 8px 6px;
    }
    .modal h2 { margin: 0 0 12px; font-size: 18px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

    .toast-host { position: fixed; right: 16px; bottom: 16px; z-index: 60; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      min-width: 240px; max-width: 420px; padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--panel2); box-shadow: 0 12px 40px rgba(0,0,0,.35);
      font-size: 13px;
    }

    .kbd { font-size: 11px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); }
    .breadcrumb { font-size: 13px; color: var(--muted); margin-bottom: 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
    .crumb {
      background: none; border: none; padding: 0; margin: 0; font: inherit; color: var(--accent);
      cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
    }
    .crumb:hover { color: #7dd3fc; }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">Aura Audit<span>Interactive workspace · Malaysia-ready retention defaults</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button type="button" class="ghost small" data-action="reset-demo">Reset demo data</button>
      </div>
    </header>
    <aside class="sidebar" id="sidebar"></aside>
    <main id="spa-root"></main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <h2 id="modalTitle">Modal</h2>
      <div id="modalBody"></div>
      <div class="modal-footer">
        <button type="button" class="ghost" data-modal="cancel">Cancel</button>
        <button type="button" class="primary" data-modal="ok">Save</button>
      </div>
    </div>
  </div>
  <div class="toast-host" id="toastHost"></div>

  <script>

          clientUsers: [],

            { id: uid(), section: 'First-year opening balances', procedure: 'Predecessor communication & opening TB verification', owner: 'EM', status: 'planned' }
          ],

        }
      ],
      ui: {
        route: { view: 'dashboard', id: null, tab: null, firmSection: 'security' },

  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return defaultState();
      return mergeDeep(defaultState(), parsed);
    } catch (e) {
      return defaultState();
    }
  }

  function mergeDeep(base, over) {
    if (!over || typeof over !== 'object') return base;
    Object.keys(over).forEach(function (k) {
      var v = over[k];
      if (v === null || v === undefined) return;
      if (typeof v === 'object' && !Array.isArray(v) && base[k] && typeof base[k] === 'object' && !Array.isArray(base[k])) {
        mergeDeep(base[k], v);
      } else {
        base[k] = v;
      }
    });
    return base;
  }

  function saveState(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* quota */ }
  }

  var state = loadState();

  function normalizeState(s) {
    s.companies = Array.isArray(s.companies) ? s.companies : [];
    s.engagements = Array.isArray(s.engagements) ? s.engagements : [];
    s.staffDirectory = Array.isArray(s.staffDirectory) ? s.staffDirectory : [];
    if (!s.firm || typeof s.firm !== 'object') s.firm = defaultState().firm;
    s.firm.passwordPolicy = s.firm.passwordPolicy || {};
    s.firm.retentionPurging = s.firm.retentionPurging || {};
    s.firm.archiving = s.firm.archiving || {};
    s.firm.customFields = Array.isArray(s.firm.customFields) ? s.firm.customFields : [];
    s.firm.methodologyLibrary = Array.isArray(s.firm.methodologyLibrary) ? s.firm.methodologyLibrary : [];
    s.firm.auditUniverse = Array.isArray(s.firm.auditUniverse) ? s.firm.auditUniverse : [];
    s.firm.auditPlanTemplates = Array.isArray(s.firm.auditPlanTemplates) ? s.firm.auditPlanTemplates : [];
    s.firm.reportFormats = Array.isArray(s.firm.reportFormats) ? s.firm.reportFormats : [];
    s.firm.riskPlanning = s.firm.riskPlanning && typeof s.firm.riskPlanning === 'object' ? s.firm.riskPlanning : {};
    s.firm.remediationPolicy = s.firm.remediationPolicy && typeof s.firm.remediationPolicy === 'object' ? s.firm.remediationPolicy : {};
    s.ui = s.ui && typeof s.ui === 'object' ? s.ui : {};
    s.ui.route = s.ui.route && typeof s.ui.route === 'object' ? s.ui.route : {};
    if (!s.ui.route.view) s.ui.route.view = 'dashboard';
    if (s.ui.route.id === undefined) s.ui.route.id = null;
    if (!s.ui.route.firmSection) s.ui.route.firmSection = 'security';
    if (!s.ui.companyTab) s.ui.companyTab = 'overview';
    if (!s.ui.engagementTab) s.ui.engagementTab = 'overview';
    if (s.ui.engagementsCompanyId === undefined || s.ui.engagementsCompanyId === null) s.ui.engagementsCompanyId = '';
    s.engagements.forEach(function (e) {
      e.teamMemberIds = Array.isArray(e.teamMemberIds) ? e.teamMemberIds : [];
      e.clientUsers = Array.isArray(e.clientUsers) ? e.clientUsers : [];
      e.riskRegister = Array.isArray(e.riskRegister) ? e.riskRegister : [];
      e.auditPlan = Array.isArray(e.auditPlan) ? e.auditPlan : [];
      e.remedies = Array.isArray(e.remedies) ? e.remedies : [];
      if (e.targetCompletionDate === undefined) e.targetCompletionDate = '';
    });
  }

  normalizeState(state);

  function companyById(id) {
    return state.companies.find(function (c) { return c.id === id; });
  }

  function engagementById(id) {
    return state.engagements.find(function (e) { return e.id === id; });
  }

  function engagementsForCompany(companyId) {
    return state.engagements.filter(function (e) { return e.companyId === companyId; });
  }

  function staffById(id) {
    return state.staffDirectory.find(function (s) { return s.id === id; });
  }

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function parseDay(d) {
    if (!d) return NaN;
    return Date.parse(String(d).slice(0, 10) + 'T00:00:00');
  }

  function engagementDeadlineHtml(e) {
    if (!e.targetCompletionDate) return '<span class="muted">—</span>';
    var due = parseDay(e.targetCompletionDate);
    var label = escapeHtml(e.targetCompletionDate);
    if (isNaN(due)) return label;
    if ((e.status || '') === 'closed') return label + ' <span class="muted">(closed)</span>';
    var diff = Math.ceil((due - parseDay(todayISO())) / 86400000);
    if (diff < 0) return label + ' <span class="pill pill-urgent">Overdue</span>';
    if (diff <= 14) return label + ' <span class="pill pill-warn">' + diff + 'd</span>';
    return label;
  }

  function formatTeamHtml(ids) {
    if (!ids || !ids.length) return '<span class="muted">—</span>';
    var names = ids.map(function (id) {
      var s = staffById(id);
      return s ? s.name : id;
    });
    var shown = names.slice(0, 3).map(function (n) { return escapeHtml(n); }).join(', ');
    var more = names.length > 3 ? ' <span class="muted">+' + (names.length - 3) + '</span>' : '';
    return shown + more;
  }

  function toast(msg) {
    var host = document.getElementById('toastHost');
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    host.appendChild(el);
    setTimeout(function () {
      el.style.opacity = '0';
      el.style.transition = 'opacity .35s';
      setTimeout(function () { host.removeChild(el); }, 380);
    }, 2600);
  }

  function openModal(opts) {
    var backdrop = document.getElementById('modalBackdrop');
    document.getElementById('modalTitle').textContent = opts.title || 'Dialog';
    document.getElementById('modalBody').innerHTML = opts.bodyHtml || '';
    var okBtn = backdrop.querySelector('[data-modal="ok"]');
    okBtn.textContent = opts.okLabel || 'Save';
    backdrop.classList.add('open');
    backdrop.setAttribute('aria-hidden', 'false');

    var modalEl = backdrop.querySelector('.modal');
    if (opts.wide) modalEl.classList.add('modal-wide');

    function cleanup() {
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
      modalEl.classList.remove('modal-wide');
      okBtn.onclick = null;
      cancelBtn.onclick = null;
      backdrop.onclick = null;
    }

    var cancelBtn = backdrop.querySelector('[data-modal="cancel"]');
    cancelBtn.onclick = function () { cleanup(); if (opts.onCancel) opts.onCancel(); };

    okBtn.onclick = function () {
      var result = opts.onOk ? opts.onOk() : true;
      if (result !== false) cleanup();
    };

    backdrop.onclick = function (ev) {
      if (ev.target === backdrop) {
        cleanup();
        if (opts.onCancel) opts.onCancel();
      }
    };

    var modal = backdrop.querySelector('.modal');
    modal.onclick = function (ev) { ev.stopPropagation(); };
  }

    var prev = state.ui.route || {};

      id: next.id !== undefined ? next.id : null,

    };
    renderAll();
    saveState(state);
  }

  function customFieldsHtml(scope, valuesObj) {
    valuesObj = valuesObj || {};
    var fields = (state.firm.customFields || []).filter(function (f) {
      return f.appliesTo === scope || f.appliesTo === 'both';
    });
    if (!fields.length) return '';
    var blocks = fields.map(function (f) {
      var v = valuesObj[f.id] != null ? String(valuesObj[f.id]) : '';
      var bind = 'data-custom-field="' + escapeHtml(f.id) + '"';
      if (f.fieldType === 'long_text') {
        return '<div class="field"><label>' + escapeHtml(f.name) + '</label><textarea ' + bind + '>' + escapeHtml(v) + '</textarea></div>';
      }
      var tp = f.fieldType === 'number' ? 'number' : (f.fieldType === 'date' ? 'date' : 'text');
      return '<div class="field"><label>' + escapeHtml(f.name) + '</label><input type="' + tp + '" ' + bind + ' value="' + escapeHtml(v) + '" /></div>';
    }).join('');
    return '<div class="section-panel" style="margin-top:14px"><h2>Firm custom fields</h2>' + blocks +
      '<p class="muted" style="margin:8px 0 0;font-size:12px;">Configure definitions under Firm settings → Custom fields.</p></div>';
  }

  function collectCustomFieldValues(root, scope) {
    var out = {};
    (state.firm.customFields || []).filter(function (f) {
      return f.appliesTo === scope || f.appliesTo === 'both';
    }).forEach(function (f) {
      var el = root.querySelector('[data-custom-field="' + f.id + '"]');
      if (el) out[f.id] = el.value;
    });
    return out;
  }

  function renderDashboard() {
    var comps = state.companies.length;
    var engs = state.engagements.length;
    var activeList = state.engagements.filter(function (e) { return (e.status || 'active') === 'active'; });
    var active = activeList.length;
    var today = parseDay(todayISO());
    var overdue = activeList.filter(function (e) {
      if (!e.targetCompletionDate) return false;
      var due = parseDay(e.targetCompletionDate);
      return !isNaN(due) && due < today;
    });
    var phaseCount = { planning: 0, fieldwork: 0, completion: 0, archived: 0 };
    state.engagements.forEach(function (e) {
      var p = e.phase || 'planning';
      if (phaseCount[p] !== undefined) phaseCount[p]++;
    });
    var openMl = 0;
    var openRem = 0;
    state.engagements.forEach(function (e) {
      (e.managementLetterItems || []).forEach(function (m) {
        if ((m.status || '') !== 'closed') openMl++;
      });
      (e.remedies || []).forEach(function (r) {
        if ((r.status || '') !== 'closed' && (r.status || '') !== 'waived') openRem++;
      });
    });
    var filingsSoon = [];
    var horizon = today + 30 * 86400000;
    state.engagements.forEach(function (e) {
      var co = companyById(e.companyId);
      (e.regulatorySubmissions || []).forEach(function (f) {
        var due = parseDay(f.due);
        if (isNaN(due) || due > horizon) return;
        if ((f.status || '') === 'filed' || (f.status || '') === 'waived') return;
        filingsSoon.push({ eng: e, co: co, f: f });
      });
    });
    filingsSoon.sort(function (a, b) { return parseDay(a.f.due) - parseDay(b.f.due); });
    var regHeat = 0;
    state.companies.forEach(function (c) {
      (c.regulatoryFlags || []).forEach(function (r) {
        if ((r.status || '') === 'investigation' || (r.status || '') === 'monitoring') regHeat++;

    var highRiskClients = state.companies.filter(function (c) { return (c.riskTier || '') === 'high'; }).length;

        '<div class="toolbar">' +
          '<button type="button" class="primary" data-action="goto-engagements">Engagements hub</button>' +

        '<div class="card" style="cursor:pointer" data-action="goto-companies" role="button" tabindex="0"><h3>Companies</h3><div class="stat">' + comps + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">High-risk clients: ' + highRiskClients + '</p></div>' +
        '<div class="card" style="cursor:pointer" data-action="goto-engagements" role="button" tabindex="0"><h3>Active engagements</h3><div class="stat">' + active + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">Total records: ' + engs + '</p></div>' +
        '<div class="card" style="cursor:pointer" data-action="goto-engagements" role="button" tabindex="0"><h3>Overdue deadlines</h3><div class="stat">' + overdue.length + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">Target completion passed</p></div>' +
        '<div class="card"><h3>Open ML points</h3><div class="stat">' + openMl + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">Across engagements</p></div>' +
        '<div class="card"><h3>Open remedies</h3><div class="stat">' + openRem + '</div>' +

        '<div class="card"><h3>Filings ≤30 days</h3><div class="stat">' + filingsSoon.length + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">Regulatory submissions due soon</p></div>' +
        '<div class="card" style="cursor:pointer" data-action="goto-universe" role="button" tabindex="0"><h3>Universe rows</h3><div class="stat">' + uni + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">Auditable areas registered</p></div>' +
        '<div class="card"><h3>Regulatory flags</h3><div class="stat">' + regHeat + '</div>' +
        '<p class="muted" style="margin:8px 0 0;font-size:12px;">Monitoring / investigation</p></div>' +
      '</div>' +

  function renderMain() {
    var r = state.ui.route;
    if (r.view === 'dashboard') return renderDashboard();
    if (r.view === 'companies') return renderCompanies();
    if (r.view === 'company') return r.id ? renderCompanyDetail(r.id) : renderCompanies();
    if (r.view === 'engagements') return renderEngagementsList();
    if (r.view === 'engagement') return r.id ? renderEngagementDetail(r.id) : renderEngagementsList();
    if (r.view === 'firm-settings') return renderFirmSettings();
    if (r.view === 'universe') return renderUniverse();
    return renderDashboard();
  }

  function renderAll() {
    renderSidebar();
    document.getElementById('spa-root').innerHTML = renderMain();
    bindSpaEvents();
  }

  function val(root, sel) {
    var el = root.querySelector(sel);
    return el ? el.value : '';
  }

  function bindSpaEvents() {
    var root = document.getElementById('spa-root');

    root.querySelectorAll('[data-company-tab]').forEach(function (b) {
      b.onclick = function () { setCompanyTab(b.getAttribute('data-company-tab')); };
    });
    root.querySelectorAll('[data-engagement-tab]').forEach(function (b) {
      b.onclick = function () { setEngagementTab(b.getAttribute('data-engagement-tab')); };
    });
    root.querySelectorAll('[data-firm-section]').forEach(function (b) {
      b.onclick = function () {
        setFirmSection(b.getAttribute('data-firm-section'));
      };
    });

    root.querySelectorAll('[data-action]').forEach(function (btn) {
      btn.onclick = null;
    });

    root.onclick = function (ev) {
      var t = ev.target.closest('[data-action]');
      if (!t || !root.contains(t)) return;
      ev.preventDefault();
      var action = t.getAttribute('data-action');
      handleAction(action, t, root);
    };

    var engFilt = root.querySelector('[data-bind="eng-company-filter"]');
    if (engFilt) {
      engFilt.onchange = function () {
        state.ui.engagementsCompanyId = engFilt.value || '';
        saveState(state);
        renderAll();
      };
    }
  }

  function handleAction(action, el, root) {

      var rowId = action === 'fil-edit' ? el.getAttribute('data-row') : null;
      var existing = rowId ? (e.regulatorySubmissions || []).find(function (x) { return x.id === rowId; }) : null;
      openModal({
        title: existing ? 'Edit regulatory filing' : 'Add regulatory filing',
        bodyHtml:
          '<div class="field"><label>Filing name</label><input id="fil_name" value="' + escapeHtml(existing ? existing.filing || '' : '') + '" /></div>' +
          '<div class="field"><label>Regulator / recipient</label><input id="fil_reg" value="' + escapeHtml(existing ? existing.regulator || '' : '') + '" /></div>' +
          '<div class="grid2">' +
          '<div class="field"><label>Due date</label><input type="date" id="fil_due" value="' + escapeHtml(existing ? existing.due || '' : '') + '" /></div>' +
          '<div class="field"><label>Status</label><select id="fil_stat">' +
          ['not_started', 'in_progress', 'filed', 'waived'].map(function (x) {
            return '<option value="' + x + '"' + ((existing && existing.status === x) ? ' selected' : '') + '>' + x + '</option>';
          }).join('') +
          '</select></div>' +
          '</div>',
        onOk: function () {
          var rec = {
            id: existing ? existing.id : uid(),
            filing: document.getElementById('fil_name').value,
            regulator: document.getElementById('fil_reg').value,
            due: document.getElementById('fil_due').value,
            status: document.getElementById('fil_stat').value
          };
          e.regulatorySubmissions = e.regulatorySubmissions || [];
          if (existing) {
            var ix = e.regulatorySubmissions.findIndex(function (x) { return x.id === rec.id; });
            if (ix >= 0) e.regulatorySubmissions[ix] = rec;
          } else e.regulatorySubmissions.push(rec);
          toast('Filing tracker updated');
          saveState(state); renderAll();
        }
      });
    } else if (action === 'fil-del') {
      var eid = el.getAttribute('data-eng');
      var rid = el.getAttribute('data-row');
      var e = engagementById(eid);
      if (!e) return;
      e.regulatorySubmissions = (e.regulatorySubmissions || []).filter(function (x) { return x.id !== rid; });
      toast('Removed');
      saveState(state); renderAll();
    } else if (action === 'firm-save-security') {
      var pp = state.firm.passwordPolicy || (state.firm.passwordPolicy = {});
      pp.sessionExpiryMinutes = parseInt(val(root, '[data-bind="sess-min"]'), 10) || 0;
      pp.passwordExpiryDays = parseInt(val(root, '[data-bind="pwd-days"]'), 10) || 0;
      pp.mfaEnforcement = val(root, '[data-bind="mfa"]');
      var raw = val(root, '[data-bind="ipwl"]');
      pp.ipWhitelist = raw.split(/\r?\n/).map(function (s) { return s.trim(); }).filter(Boolean);
      toast('Security policy saved');
      saveState(state); renderAll();
    } else if (action === 'firm-save-retention') {
      var rp = state.firm.retentionPurging || (state.firm.retentionPurging = {});
      rp.completedEngagementYears = parseInt(val(root, '[data-bind="ret-years"]'), 10) || 7;
      rp.regulatoryNote = val(root, '[data-bind="ret-note"]');
      rp.purgeProcedure = val(root, '[data-bind="ret-purge"]');
      toast('Retention policy saved');
      saveState(state); renderAll();
    } else if (action === 'firm-save-archive') {
      var ar = state.firm.archiving || (state.firm.archiving = {});
      ar.autoArchiveDaysAfterSignoff = parseInt(val(root, '[data-bind="arch-days"]'), 10) || 0;
      ar.notes = val(root, '[data-bind="arch-notes"]');
      toast('Archiving rules saved');
      saveState(state); renderAll();
    } else if (action === 'cf-add' || action === 'cf-edit') {
      var rowId = action === 'cf-edit' ? el.getAttribute('data-row') : null;
      var fs = state.firm;
      var existing = rowId ? (fs.customFields || []).find(function (x) { return x.id === rowId; }) : null;
      openModal({
        title: existing ? 'Edit custom field' : 'Add custom field',
        bodyHtml:
          '<div class="field"><label>Name</label><input id="cf_name" value="' + escapeHtml(existing ? existing.name || '' : '') + '" /></div>' +
          '<div class="grid2">' +
          '<div class="field"><label>Applies to</label><select id="cf_app">' +
          ['company', 'engagement', 'both'].map(function (x) {
            return '<option value="' + x + '"' + ((existing && existing.appliesTo === x) ? ' selected' : '') + '>' + x + '</option>';
          }).join('') +
          '</select></div>' +
          '<div class="field"><label>Type</label><select id="cf_type">' +
          ['text', 'number', 'date', 'long_text'].map(function (x) {
            return '<option value="' + x + '"' + ((existing && existing.fieldType === x) ? ' selected' : '') + '>' + x + '</option>';
          }).join('') +
          '</select></div>' +
          '</div>',
        onOk: function () {
          var rec = {
            id: existing ? existing.id : uid(),
            name: document.getElementById('cf_name').value.trim() || 'Untitled field',
            appliesTo: document.getElementById('cf_app').value,
            fieldType: document.getElementById('cf_type').value
          };
          fs.customFields = fs.customFields || [];
          if (existing) {
            var ix = fs.customFields.findIndex(function (x) { return x.id === rec.id; });
            if (ix >= 0) fs.customFields[ix] = rec;
          } else fs.customFields.push(rec);
          toast('Custom field saved');
          saveState(state); renderAll();
        }
      });
    } else if (action === 'cf-del') {
      var rid = el.getAttribute('data-row');
      state.firm.customFields = (state.firm.customFields || []).filter(function (x) { return x.id !== rid; });
      toast('Removed');
      saveState(state); renderAll();
    } else if (action === 'mlib-add' || action === 'mlib-edit') {
      var rowId = action === 'mlib-edit' ? el.getAttribute('data-row') : null;
      var fs = state.firm;
      var existing = rowId ? (fs.methodologyLibrary || []).find(function (x) { return x.id === rowId; }) : null;
      openModal({
        title: existing ? 'Edit methodology note' : 'Add methodology note',
        bodyHtml:
          '<div class="field"><label>Title</label><input id="mlib_title" value="' + escapeHtml(existing ? existing.title || '' : '') + '" /></div>' +
          '<div class="field"><label>Category</label><input id="mlib_cat" placeholder="Approach, Execution, Reporting..." value="' + escapeHtml(existing ? existing.category || '' : '') + '" /></div>' +
          '<div class="field"><label>Body</label><textarea id="mlib_body">' + escapeHtml(existing ? existing.body || '' : '') + '</textarea></div>',
        onOk: function () {
          var rec = {
            id: existing ? existing.id : uid(),
            title: document.getElementById('mlib_title').value.trim() || 'Untitled',
            category: document.getElementById('mlib_cat').value,
            body: document.getElementById('mlib_body').value
          };
          fs.methodologyLibrary = fs.methodologyLibrary || [];
          if (existing) {
            var ix = fs.methodologyLibrary.findIndex(function (x) { return x.id === rec.id; });
            if (ix >= 0) fs.methodologyLibrary[ix] = rec;
          } else fs.methodologyLibrary.push(rec);
          toast('Methodology library updated');
          saveState(state); renderAll();
        }
      });
    } else if (action === 'mlib-del') {
      var rid = el.getAttribute('data-row');
      state.firm.methodologyLibrary = (state.firm.methodologyLibrary || []).filter(function (x) { return x.id !== rid; });
      toast('Removed');
      saveState(state); renderAll();
    } else if (action === 'staff-add' || action === 'staff-edit') {
      var rowId = action === 'staff-edit' ? el.getAttribute('data-row') : null;
      var existing = rowId ? state.staffDirectory.find(function (x) { return x.id === rowId; }) : null;
      openModal({
        title: existing ? 'Edit team member' : 'Add team member',
        bodyHtml:
          '<div class="field"><label>Name</label><input id="st_name" value="' + escapeHtml(existing ? existing.name || '' : '') + '" /></div>' +
          '<div class="field"><label>Role</label><input id="st_role" placeholder="Manager, Senior..." value="' + escapeHtml(existing ? existing.role || '' : '') + '" /></div>',
        onOk: function () {
          var rec = {
            id: existing ? existing.id : uid(),
            name: document.getElementById('st_name').value.trim() || 'Unnamed',
            role: document.getElementById('st_role').value.trim()
          };
          state.staffDirectory = state.staffDirectory || [];
          if (existing) {
            var ix = state.staffDirectory.findIndex(function (x) { return x.id === rec.id; });
            if (ix >= 0) state.staffDirectory[ix] = rec;
          } else state.staffDirectory.push(rec);
          toast('Staff directory updated');
          saveState(state); renderAll();
        }
      });
    } else if (action === 'staff-del') {
      var sid = el.getAttribute('data-row');
      state.staffDirectory = (state.staffDirectory || []).filter(function (x) { return x.id !== sid; });
      toast('Removed');
      saveState(state); renderAll();
    }
  }

  document.querySelector('[data-action="reset-demo"]').onclick = function () {
    if (!confirm('Replace workspace data with seeded demo?')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = defaultState();
    normalizeState(state);
    saveState(state);
    toast('Demo data restored');
    navigate({ view: 'dashboard', id: null, firmSection: 'security' });
  };

  var bootRoute = state.ui.route && state.ui.route.view
    ? Object.assign({ firmSection: 'security' }, state.ui.route)
    : { view: 'dashboard', id: null, firmSection: 'security' };
  navigate(bootRoute);
})();
  </script>
</body>
</html>
