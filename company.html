<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura IA — Company Workspace</title>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel2: #172033;
      --panel3: #1f2a44;
      --line: #2b3854;
      --text: #e5edf8;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --radius: 14px;
      --sidebar: 274px;
      --top: 62px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-rows: var(--top) 1fr;
    }

    .topbar {
      grid-column: 1 / -1;
      height: var(--top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 18, 32, .96);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      margin-top: 1px;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
    }

    .btn.ghost {
      background: transparent;
    }

    .btn.small {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 8px;
    }

    .btn.danger {
      border-color: rgba(251,113,133,.45);
      color: #fecdd3;
      background: rgba(251,113,133,.08);
    }

    .sidebar {
      grid-row: 2;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #0f172a, #111827);
      padding: 14px 10px;
      overflow: auto;
    }

    .company-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.025);
      border-radius: 14px;
      padding: 13px;
      margin-bottom: 14px;
    }

    .company-card h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .company-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .nav-section {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .13em;
      margin: 16px 10px 7px;
    }

    .nav-section:first-of-type {
      margin-top: 4px;
    }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 11px;
      margin-bottom: 5px;
      border: 1px solid transparent;
      border-radius: 11px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,.035);
      border-color: rgba(255,255,255,.06);
    }

    .nav-btn.active {
      background: rgba(56,189,248,.12);
      border-color: rgba(56,189,248,.35);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .nav-ico {
      width: 20px;
      text-align: center;
    }

    .nav-count {
      color: var(--muted);
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      background: rgba(255,255,255,.025);
    }

    main {
      grid-row: 2;
      overflow: auto;
      padding: 22px 24px 48px;
    }

    .client-banner {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, var(--panel2), var(--panel));
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .client-banner h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.03em;
    }

    .client-banner p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      letter-spacing: -.045em;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 920px;
      line-height: 1.5;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .panel,
    .card,
    .setting-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: 0 16px 42px rgba(0,0,0,.12);
    }

    .panel {
      padding: 15px;
      margin-bottom: 14px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .card {
      padding: 14px;
      min-height: 92px;
    }

    .card-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .card-value {
      margin-top: 7px;
      font-size: 25px;
      font-weight: 850;
      letter-spacing: -.04em;
    }

    .card-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      min-width: 980px;
    }

    th,
    td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      color: var(--muted);
      background: var(--panel2);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 750;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover td {
      background: rgba(255,255,255,.025);
    }

    td strong {
      color: #fff;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 11px;
      color: var(--text);
      background: rgba(255,255,255,.025);
      white-space: nowrap;
    }

    .pill.high,
    .pill.overdue,
    .pill.critical,
    .pill.unsatisfactory {
      border-color: rgba(251,113,133,.45);
      color: #fecdd3;
      background: rgba(251,113,133,.07);
    }

    .pill.medium,
    .pill.in-progress,
    .pill.fieldwork,
    .pill.draft,
    .pill.needs-improvement,
    .pill.management-response-due,
    .pill.partial {
      border-color: rgba(251,191,36,.45);
      color: #fde68a;
      background: rgba(251,191,36,.06);
    }

    .pill.low,
    .pill.on-track,
    .pill.active,
    .pill.closed,
    .pill.completed,
    .pill.final-issued,
    .pill.satisfactory,
    .pill.done,
    .pill.received {
      border-color: rgba(52,211,153,.42);
      color: #bbf7d0;
      background: rgba(52,211,153,.06);
    }

    .pill.blue,
    .pill.planning,
    .pill.open,
    .pill.not-started,
    .pill.approved,
    .pill.pending {
      border-color: rgba(56,189,248,.45);
      color: #bae6fd;
      background: rgba(56,189,248,.08);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
      align-items: start;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 12px;
    }

    .setting-card {
      padding: 16px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .setting-card h3 {
      margin: 0;
      font-size: 16px;
    }

    .setting-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .setting-card .btn {
      margin-top: auto;
      width: fit-content;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f172a;
      padding: 8px 10px;
      outline: none;
    }

    .field textarea {
      min-height: 88px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .subtabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .subtab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 12px;
    }

    .subtab.active {
      color: #fff;
      border-color: rgba(56,189,248,.45);
      background: rgba(56,189,248,.12);
    }

    .engagement-header {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 15px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .engagement-header h1 {
      font-size: 24px;
    }

    .muted {
      color: var(--muted);
    }

    @media(max-width:1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      main {
        padding: 18px;
      }

      .cards {
        grid-template-columns: repeat(2,1fr);
      }

      .grid-2,
      .grid-3,
      .settings-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .client-banner,
      .engagement-header {
        flex-direction: column;
      }

      .table-wrap {
        max-height: none;
      }
    }

    @media(max-width:650px) {
      .topbar {
        height: auto;
        padding: 14px 16px;
        flex-direction: column;
        align-items: flex-start;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .page-head {
        flex-direction: column;
      }
    }
  </style>
</head>

<script>
function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[ch]));
}

function slug(v){
  return String(v || '').toLowerCase().trim().replaceAll(' ','-').replaceAll('/','-');
}

function pill(v){
  return '<span class="pill ' + esc(slug(v)) + '">' + esc(v) + '</span>';
}

function pageTitle(title, sub, actions){
  return `
    <section class="page-head">
      <div>
        <h1>${esc(title)}</h1>
        <p class="subtitle">${esc(sub)}</p>
      </div>
      <div class="top-actions">${actions || ''}</div>
    </section>
  `;
}

function tablePanel(title, note, headers, rows, actions){
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>${esc(title)}</h2>
          <span>${esc(note)}</span>
        </div>
        <div class="top-actions">${actions || '<button class="btn primary small">+ Add</button>'}</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                ${row.map((cell, i) => `
                  <td>${i === 0 ? '<strong>' : ''}${cell}${i === 0 ? '</strong>' : ''}</td>
                `).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function cardRow(items){
  return `
    <section class="cards">
      ${items.map(item => `
        <div class="card">
          <div class="card-label">${esc(item[0])}</div>
          <div class="card-value">${esc(item[1])}</div>
          <div class="card-note">${esc(item[2])}</div>
        </div>
      `).join('')}
    </section>
  `;
}

function formPanel(title, note, fields){
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>${esc(title)}</h2>
          <span>${esc(note)}</span>
        </div>
        <button class="btn primary small">Save</button>
      </div>

      <div class="form-grid">
        ${fields.map(field => {
          const [label, type, value] = field;

          if(type === 'textarea'){
            return `
              <div class="field">
                <label>${esc(label)}</label>
                <textarea>${esc(value)}</textarea>
              </div>
            `;
          }

          if(type === 'select'){
            return `
              <div class="field">
                <label>${esc(label)}</label>
                <select>
                  ${value.map(v => `<option>${esc(v)}</option>`).join('')}
                </select>
              </div>
            `;
          }

          return `
            <div class="field">
              <label>${esc(label)}</label>
              <input value="${esc(value)}">
            </div>
          `;
        }).join('')}
      </div>
    </section>
  `;
}

function cards(items){
  return `
    <section class="settings-grid">
      ${items.map(item => `
        <article class="setting-card">
          <h3>${esc(item[0])}</h3>
          <p>${esc(item[1])}</p>
          <button class="btn small ghost">Open</button>
        </article>
      `).join('')}
    </section>
  `;
}

function applyClientFromUrl(){
  const id = new URLSearchParams(location.search).get('clientId');
  if (!id) return;
  const c = CLIENT_BY_ID[id];
  const title = c ? c.name : id.replace(/-/g, ' ').replace(/\b\w/g, function (ch) { return ch.toUpperCase(); });
  document.querySelector('.company-card h3').textContent = title;
  document.querySelector('.company-card p').innerHTML = c
    ? (esc(c.group) + ' · ' + esc(c.risk) + ' Risk · ' + esc(c.status) + '<br>Lead: ' + esc(c.lead))
    : ('New client workspace<br><span class="muted">Id: ' + esc(id) + '</span>');
  document.querySelector('#companyBanner h2').textContent = title;
  document.querySelector('#companyBanner p').textContent = c
    ? (c.industry + ' · ' + c.group + ' · ' + c.risk + ' Risk · ' + c.status + ' · Lead: ' + c.lead)
    : ('Client id: ' + id);
  document.title = 'Aura IA — ' + title;
}

function showView(view){
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(view + 'View').classList.add('active');

  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });

  if(view === 'engagementDetail'){
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === 'engagements');
    });
  }
}

function openEngagement(id){
  currentEngagementId = id || 'procurement';
  currentEngagementTab = 'overview';
  renderEngagementDetail();
  showView('engagementDetail');
}

function wire(){
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.onclick = () => showView(btn.dataset.view);
  });

  document.body.addEventListener('click', function(e){
    const openBtn = e.target.closest('[data-action="open-engagement"]');
    if(openBtn) {
      openEngagement(openBtn.dataset.engagement);
    }

    const shortcut = e.target.closest('[data-view-shortcut]');
    if(shortcut) {
      showView(shortcut.dataset.viewShortcut);
    }

    const tab = e.target.closest('[data-eng-tab]');
    if(tab) {
      currentEngagementTab = tab.dataset.engTab;
      renderEngagementDetail();
    }
  });
}
