<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura IA — Company workspace</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111827;
      --surface-2: #172033;
      --surface-3: #1f2a44;
      --line: #2b3854;
      --text: #e5edf8;
      --muted: #94a3b8;
      --soft: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #fb7185;
      --critical: #ef4444;
      --sidebar: 264px;
      --top: 56px;
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-rows: var(--top) 1fr;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(11,18,32,.94);
      backdrop-filter: blur(10px);
    }

    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: -.02em; }
    a.brand-link { text-decoration: none; color: inherit; cursor: pointer; border-radius: 12px; outline-offset: 4px; }
    a.brand-link:hover .brand-mark { filter: brightness(1.08); }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      box-shadow: 0 10px 30px rgba(56,189,248,.22);
    }
    .brand small { display: block; color: var(--muted); font-weight: 500; font-size: 12px; margin-top: 1px; }

    .top-actions { display: flex; gap: 8px; align-items: center; }
    .search {
      min-width: 280px;
      border: 1px solid var(--line);
      background: #0f172a;
      border-radius: 999px;
      padding: 9px 12px;
      color: var(--soft);
    }

    .sidebar {
      grid-row: 2;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #0f172a, #111827);
      padding: 16px 12px;
      overflow: auto;
    }

    .nav-section { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; margin: 18px 10px 8px; }
    .nav-section:first-child { margin-top: 4px; }
    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 5px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--soft);
      text-align: left;
    }
    .nav-btn:hover { background: rgba(255,255,255,.035); border-color: rgba(255,255,255,.06); }
    .nav-btn.active { background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.3); color: white; }
    .nav-ico { width: 22px; text-align: center; opacity: .95; }

    main { grid-row: 2; overflow: auto; padding: 22px 26px 48px; }

    .page-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 18px; }
    .title h1 { margin: 0; font-size: 26px; letter-spacing: -.03em; }
    .title p { margin: 6px 0 0; color: var(--muted); font-size: 14px; max-width: 800px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
    }
    .btn.primary { border-color: transparent; background: linear-gradient(135deg, #0ea5e9, #6366f1); color: white; }
    .btn.ghost { background: transparent; }
    .btn.small { font-size: 12px; padding: 5px 8px; border-radius: 8px; }
    a.btn { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }

    .kpis { display: grid; grid-template-columns: repeat(6, minmax(130px, 1fr)); gap: 12px; margin-bottom: 18px; }
    @media (max-width: 1180px) { .kpis { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 680px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } main { padding: 16px; } .search { display: none; } .kpis { grid-template-columns: 1fr 1fr; } }

    .kpi, .panel, .card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 16px 40px rgba(0,0,0,.12);
    }
    .kpi { padding: 15px; min-height: 96px; }
    .kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
    .kpi .value { margin-top: 8px; font-size: 28px; font-weight: 800; letter-spacing: -.04em; }
    .kpi .note { margin-top: 4px; color: var(--muted); font-size: 12px; }

    .grid-2 { display: grid; grid-template-columns: 1.25fr .75fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 980px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    .panel { padding: 16px; margin-bottom: 14px; }
    .panel-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .panel-title h2 { margin: 0; font-size: 15px; letter-spacing: -.01em; }
    .panel-title span { color: var(--muted); font-size: 12px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); background: var(--surface-2); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    td strong { color: white; }
    .muted { color: var(--muted); }

    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line); font-size: 11px; color: var(--soft); white-space: nowrap; }
    .pill.high, .pill.critical { border-color: rgba(251,113,133,.45); color: #fecdd3; background: rgba(251,113,133,.07); }
    .pill.medium { border-color: rgba(251,191,36,.45); color: #fde68a; background: rgba(251,191,36,.06); }
    .pill.low { border-color: rgba(52,211,153,.42); color: #bbf7d0; background: rgba(52,211,153,.06); }
    .pill.blue { border-color: rgba(56,189,248,.45); color: #bae6fd; background: rgba(56,189,248,.08); }
    .pill.gray { color: var(--muted); }

    .workflow { display: grid; grid-template-columns: repeat(7, minmax(120px, 1fr)); gap: 8px; margin-bottom: 18px; }
    @media (max-width: 1180px) { .workflow { grid-template-columns: repeat(3, 1fr); } }
    .step {
      position: relative;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      min-height: 88px;
    }
    .step .num { color: var(--accent); font-weight: 800; font-size: 12px; }
    .step .name { margin-top: 6px; font-weight: 700; font-size: 13px; }
    .step .sub { margin-top: 4px; color: var(--muted); font-size: 11px; line-height: 1.35; }

    .heatmap { display: grid; grid-template-columns: 70px repeat(5, 1fr); gap: 6px; align-items: stretch; }
    .heatmap div { min-height: 34px; display: grid; place-items: center; border-radius: 8px; font-size: 12px; color: var(--soft); border: 1px solid rgba(255,255,255,.06); }
    .heatmap .axis { background: transparent; border: none; color: var(--muted); font-size: 11px; }
    .heat-1 { background: rgba(52,211,153,.16); }
    .heat-2 { background: rgba(251,191,36,.14); }
    .heat-3 { background: rgba(251,113,133,.14); }
    .heat-4 { background: rgba(239,68,68,.26); }

    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 14px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .tab { border: 1px solid transparent; background: transparent; color: var(--muted); border-radius: 999px; padding: 7px 11px; }
    .tab.active { color: white; background: var(--surface-2); border-color: var(--line); }

    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 760px) { .form-grid { grid-template-columns: 1fr; } }
    .field label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; background: #0f172a; padding: 9px 10px; }
    .field textarea { min-height: 92px; resize: vertical; }

    .progress { height: 8px; border-radius: 999px; background: #0f172a; border: 1px solid var(--line); overflow: hidden; }
    .progress > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .card { padding: 15px; }
    .card h3 { margin: 0; font-size: 16px; letter-spacing: -.02em; }
    .card p { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    .empty { padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: var(--radius); background: rgba(255,255,255,.02); }
  </style>
</head>
<body>
<div class="app">

const root = document.getElementById('root');
const sidebar = document.getElementById('sidebar');

function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function pill(v){ const c = String(v).toLowerCase().replace(/\s+/g,'-'); return `<span class="pill ${c}">${esc(v)}</span>`; }
function setView(v){ state.view = v; render(); }
function setEngagement(id){ state.activeEngagement = id; state.view = 'engagementDetail'; render(); }

function renderSidebar(){
  sidebar.innerHTML = state.nav.map(group => `
    <div class="nav-section">${group.group}</div>
    ${group.items.map(([key, ico, label]) => `<button class="nav-btn ${state.view===key?'active':''}" onclick="setView('${key}')"><span class="nav-ico">${ico}</span>${label}</button>`).join('')}
  `).join('');
}

function header(title, subtitle, actions=''){
  return `<div class="page-head"><div class="title"><h1>${title}</h1><p>${subtitle}</p></div><div class="toolbar">${actions}</div></div>`;
}

function table(headers, rows){
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('') || `<tr><td colspan="${headers.length}" class="muted">No records.</td></tr>`}</tbody></table></div>`;
}

function dashboard(){
  const openFindings = state.findings.filter(f=>f.status !== 'Closed');
  const highRiskAreas = state.universe.filter(u=>u.residual === 'High').length;
  const overdue = state.findings.filter(f=>f.status !== 'Closed' && new Date(f.due) < new Date('2026-05-06')).length;

    ${['Audit Universe|Define what can be audited','Risk Assessment|Score risks and controls','Annual Plan|Select audits and timing','Engagement Planning|Scope, RCM, PBC, program','Fieldwork|Test controls and evidence','Reporting|Issue IA report','Follow-up|Validate closure'].map((s,i)=>{const [a,b]=s.split('|'); return `<div class="step"><div class="num">${String(i+1).padStart(2,'0')}</div><div class="name">${a}</div><div class="sub">${b}</div></div>`}).join('')}
  </div>
  <div class="kpis">
    <div class="kpi"><div class="label">Auditable areas</div><div class="value">${state.universe.length}</div><div class="note">Across all departments</div></div>
    <div class="kpi"><div class="label">High-risk areas</div><div class="value">${highRiskAreas}</div><div class="note">Residual risk high</div></div>
    <div class="kpi"><div class="label">Approved audits</div><div class="value">${state.annualPlan.filter(x=>x.status==='Approved').length}</div><div class="note">2026 plan</div></div>
    <div class="kpi"><div class="label">Active audits</div><div class="value">${state.engagements.filter(e=>e.phase !== 'Not started').length}</div><div class="note">Planning / fieldwork</div></div>
    <div class="kpi"><div class="label">Open findings</div><div class="value">${openFindings.length}</div><div class="note">Across all audits</div></div>
    <div class="kpi"><div class="label">Overdue actions</div><div class="value">${overdue}</div><div class="note">Needs escalation</div></div>
  </div>
  <div class="grid-2">
    <div class="panel"><div class="panel-title"><h2>Annual audit plan progress</h2><span>2026</span></div>${planTable(true)}</div>
    <div class="panel"><div class="panel-title"><h2>Risk heat map</h2><span>Likelihood × Impact</span></div>${heatmap()}</div>
  </div>
  <div class="grid-2">
    <div class="panel"><div class="panel-title"><h2>High-risk findings needing attention</h2><span>${openFindings.length} open</span></div>${findingsTable(state.findings.filter(f=>f.severity==='High'))}</div>
    <div class="panel"><div class="panel-title"><h2>Reports awaiting action</h2><span>Draft / review / final</span></div>${reportsTable()}</div>
  </div>`;
}

function heatmap(){
  let cells = '<div class="axis"></div>' + [1,2,3,4,5].map(i=>`<div class="axis">Impact ${i}</div>`).join('');
  for(let l=5;l>=1;l--){
    cells += `<div class="axis">Likely ${l}</div>`;
    for(let i=1;i<=5;i++){
      const score = l*i;
      const cls = score>=20?'heat-4':score>=12?'heat-3':score>=6?'heat-2':'heat-1';
      const count = state.risks.filter(r=>r.likelihood===l && r.impact===i).length;
      cells += `<div class="${cls}">${count?count:''}</div>`;
    }
  }
  return `<div class="heatmap">${cells}</div>`;
}

function universe(){
  return header('Audit Universe','The full population of auditable areas. This is the foundation for risk assessment and the annual audit plan.', `<button class="btn primary">+ Add area</button><button class="btn ghost">Import departments</button>`) +
  `<div class="panel"><div class="panel-title"><h2>Auditable areas</h2><span>Sorted by residual risk and next audit cycle</span></div>${universeTable()}</div>`;
}
function universeTable(){
  return table(['Area','Department','Owner','Inherent','Controls','Residual','Frequency','Last / Next','Status','Key risks'], state.universe.map(u=>`<tr><td><strong>${u.area}</strong></td><td>${u.department}</td><td>${u.owner}</td><td>${pill(u.inherent)}</td><td>${pill(u.controls)}</td><td>${pill(u.residual)}</td><td>${u.frequency}</td><td><span class="muted">Last:</span> ${u.last}<br><span class="muted">Next:</span> ${u.next}</td><td>${pill(u.status)}</td><td>${u.risks}</td></tr>`));
}

function risk(){
  return header('Risk Assessment','Identify what can go wrong, score likelihood and impact, assess controls, and decide audit response.', `<button class="btn primary">+ Add risk</button><button class="btn ghost">Risk library</button>`) +
  `<div class="grid-2"><div class="panel"><div class="panel-title"><h2>Risk and control assessment</h2><span>Risk-based planning evidence</span></div>${riskTable()}</div><div class="panel"><div class="panel-title"><h2>Risk heat map</h2><span>Current assessment</span></div>${heatmap()}</div></div>`;
}
function riskTable(){
  return table(['Area','Category','Risk','L × I','Inherent','Controls','Control rating','Residual','Audit response','Rationale'], state.risks.map(r=>`<tr><td><strong>${r.area}</strong></td><td>${r.category}</td><td>${r.risk}</td><td>${r.likelihood} × ${r.impact}</td><td>${r.inherent}</td><td>${r.controls}</td><td>${pill(r.controlRating)}</td><td>${pill(r.residual)}</td><td>${r.response}</td><td>${r.rationale}</td></tr>`));
}

function annualPlan(){
  return header('Annual Audit Plan','Translate risk assessment into an approved audit schedule: what to audit, when, why, and how much resource is needed.', `<button class="btn primary">+ Add to plan</button><button class="btn ghost">Submit for approval</button>`) +
  `<div class="panel"><div class="panel-title"><h2>2026 risk-based audit plan</h2><span>Proposed and approved audits</span></div>${planTable(false)}</div>`;
}
function planTable(compact){
  return table(['Audit','Area','Priority','Quarter','Days','Status','Reason','Sponsor'], state.annualPlan.slice(0, compact ? 4 : 99).map(p=>`<tr><td><strong>${p.audit}</strong></td><td>${p.area}</td><td>${pill(p.priority)}</td><td>${p.quarter}</td><td>${p.days}</td><td>${pill(p.status)}</td><td>${p.reason}</td><td>${p.sponsor}</td></tr>`));
}

function engagements(){
  return header('Audit Engagements','Workspace for each selected audit: planning memo, RCM, PBC, fieldwork, findings, report, and follow-up.', `<button class="btn primary">+ Create engagement</button>`) +
  `<div class="cards">${state.engagements.map(e=>`<div class="card"><h3>${e.title}</h3><p>${e.objective}</p><div class="progress"><span style="width:${e.progress}%"></span></div><div class="card-meta">${pill(e.phase)}${pill(e.rating)}<span class="pill gray">${e.owner}</span><span class="pill gray">${e.start} → ${e.end}</span></div><div style="margin-top:14px"><button class="btn small primary" onclick="setEngagement('${e.id}')">Open workspace</button></div></div>`).join('')}</div>`;
}

function engagementDetail(){
  const e = state.engagements.find(x=>x.id===state.activeEngagement) || state.engagements[0];
  const tabs = ['overview','planning memo','risk & control matrix','pbc','fieldwork','findings','report'];
  let body = '';
  if(state.engagementTab === 'overview') body = engagementOverview(e);
  if(state.engagementTab === 'planning memo') body = planningMemo(e);
  if(state.engagementTab === 'risk & control matrix') body = riskControlMatrix();
  if(state.engagementTab === 'pbc') body = pbcTable();
  if(state.engagementTab === 'fieldwork') body = workprogramTable();
  if(state.engagementTab === 'findings') body = findingsTable(state.findings.filter(f=>f.audit===e.title));
  if(state.engagementTab === 'report') body = reportBuilder(e);
  return `<div class="page-head"><div class="title"><h1>${e.title}</h1><p>${e.code} · ${e.department} · ${e.phase} · Audit owner: ${e.owner}</p></div><div class="toolbar"><button class="btn ghost" onclick="setView('engagements')">← Engagements</button><button class="btn primary">Add finding</button></div></div>
  <div class="tabs">${tabs.map(t=>`<button class="tab ${state.engagementTab===t?'active':''}" onclick="state.engagementTab='${t}';render()">${t}</button>`).join('')}</div>
  ${body}`;
}
function engagementOverview(e){
  return `<div class="grid-2"><div class="panel"><div class="panel-title"><h2>Engagement summary</h2><span>${e.progress}% complete</span></div><div class="form-grid"><div class="field"><label>Objective</label><textarea>${e.objective}</textarea></div><div class="field"><label>Scope</label><textarea>${e.scope}</textarea></div><div class="field"><label>Start date</label><input value="${e.start}"></div><div class="field"><label>Target end date</label><input value="${e.end}"></div><div class="field"><label>Phase</label><select><option>${e.phase}</option></select></div><div class="field"><label>Overall risk</label><select><option>${e.rating}</option></select></div></div></div><div class="panel"><div class="panel-title"><h2>Execution status</h2></div><div class="progress"><span style="width:${e.progress}%"></span></div><p class="muted">Use this area for audit manager review, outstanding PBC, open review notes, and next milestone.</p></div></div>`;
}
function planningMemo(e){
  return `<div class="panel"><div class="panel-title"><h2>Planning memo</h2><span>Engagement-level planning</span></div><div class="form-grid"><div class="field"><label>Background</label><textarea>Procurement was selected due to high residual fraud and bribery risk, high spending volume, many vendors, and weak vendor master controls.</textarea></div><div class="field"><label>Audit objective</label><textarea>${e.objective}</textarea></div><div class="field"><label>Scope period</label><input value="1 Jan 2025 to 31 Dec 2025"></div><div class="field"><label>Out of scope</label><input value="Inventory usage and supplier performance evaluation"></div><div class="field"><label>Team</label><input value="Audit Manager, Senior Auditor, IT/Data Analyst"></div><div class="field"><label>Deliverables</label><input value="Draft report, final IA report, follow-up tracker"></div></div></div>`;
}
function riskControlMatrix(){
  return `<div class="panel"><div class="panel-title"><h2>Risk & Control Matrix</h2><span>RCM links risks to controls and audit tests</span></div>${table(['Risk','Expected control','Control owner','Test procedure','Result','Conclusion'], [
    ['Fake vendor created','New vendor must be approved and independently verified','Procurement Manager','Select new vendors and check approval, registration, bank verification','In progress','Pending'],
    ['Bribery / favoritism','Purchases above threshold require quotation comparison and evaluation approval','Tender Committee','Review sample of purchases above threshold','Exception noted','Control ineffective'],
    ['Split purchase','System or management detects repeated purchases below approval threshold','Finance Controller','Run split-purchase data analysis','2 exceptions','Further review'],
    ['Payment for undelivered goods','3-way match between PO, GRN, and invoice before payment','Accounts Payable','Inspect PO, GRN, invoice and payment approval','In progress','Pending']
  ].map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`))}</div>`;
}
function pbcTable(){ return `<div class="panel"><div class="panel-title"><h2>PBC / Document Requests</h2><span>Documents requested from auditee</span></div>${table(['Document','Provided by','Status','Purpose'], state.pbc.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`))}</div>`; }
function workprogramTable(){ return `<div class="panel"><div class="panel-title"><h2>Audit Program / Fieldwork</h2><span>Detailed procedures and testing status</span></div>${table(['Area','Procedure','Status','Result'], state.workprogram.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`))}</div>`; }
function reportBuilder(e){ return `<div class="panel"><div class="panel-title"><h2>Internal audit report builder</h2><span>Draft → management response → final issued</span></div><div class="form-grid"><div class="field"><label>Executive summary</label><textarea>Procurement controls require improvement. Key issues noted in vendor onboarding approval and split-purchase monitoring.</textarea></div><div class="field"><label>Overall audit rating</label><select><option>Needs improvement</option><option>Satisfactory</option><option>Unsatisfactory</option></select></div><div class="field"><label>Distribution</label><input value="CEO, CFO, COO, Audit Committee"></div><div class="field"><label>Report status</label><select><option>Draft with audit manager</option><option>Sent for management response</option><option>Final issued</option></select></div></div>${findingsTable(state.findings.filter(f=>f.audit===e.title))}</div>`; }

function findings(){ return header('Findings Register','Single source of truth for all internal audit findings, risk ratings, management responses, owners, due dates, and closure status.', `<button class="btn primary">+ New finding</button><button class="btn ghost">Bulk update</button>`) + `<div class="panel">${findingsTable(state.findings)}</div>`; }
function findingsTable(list){
  return table(['Finding','Audit','Department','Severity','Status','Owner','Due date','Recommendation'], list.map(f=>`<tr><td><strong>${f.title}</strong><div class="muted">${f.condition}</div></td><td>${f.audit}</td><td>${f.department}</td><td>${pill(f.severity)}</td><td>${pill(f.status)}</td><td>${f.owner}</td><td>${f.due}</td><td>${f.recommendation}</td></tr>`));
}

function reports(){ return header('Reports','Create draft and final internal audit reports from approved findings and management responses.', `<button class="btn primary">+ New report</button>`) + `<div class="panel">${reportsTable()}</div>`; }
function reportsTable(){ return table(['Report','Audit','Status','Overall rating','Issue date','Audience'], state.reports.map(r=>`<tr><td><strong>${r.title}</strong></td><td>${r.audit}</td><td>${pill(r.status)}</td><td>${r.rating}</td><td>${r.issueDate}</td><td>${r.audience}</td></tr>`)); }

function followup(){ const open = state.findings.filter(f=>f.status !== 'Closed'); return header('Follow-up Tracker','Track management action plans until evidence is submitted, validated by Internal Audit, and formally closed.', `<button class="btn primary">Send reminders</button><button class="btn ghost">Escalate overdue</button>`) + `<div class="panel">${table(['Finding','Severity','Action owner','Due date','Current status','IA validation'], open.map(f=>`<tr><td><strong>${f.title}</strong><div class="muted">${f.audit}</div></td><td>${pill(f.severity)}</td><td>${f.owner}</td><td>${f.due}</td><td>${pill(f.status)}</td><td>Pending evidence review</td></tr>`))}</div>`; }

function committee(){ return header('Audit Committee Pack','High-level reporting for the board/audit committee: audit plan progress, high-risk findings, overdue actions, and unresolved risks.', `<button class="btn primary">Generate PDF pack</button>`) + `<div class="grid-3"><div class="panel"><div class="panel-title"><h2>Plan progress</h2></div><div class="kpi"><div class="label">Completed / approved</div><div class="value">1 / 4</div><div class="note">2026 annual plan</div></div></div><div class="panel"><div class="panel-title"><h2>High-risk findings</h2></div><div class="kpi"><div class="label">Open high</div><div class="value">2</div><div class="note">Requires committee visibility</div></div></div><div class="panel"><div class="panel-title"><h2>Overdue actions</h2></div><div class="kpi"><div class="label">Overdue</div><div class="value">1</div><div class="note">Escalation required</div></div></div></div><div class="panel"><div class="panel-title"><h2>Pack contents</h2><span>Suggested sections</span></div>${table(['Section','Content'], [['Executive summary','Overall IA opinion, key themes, major changes'],['Audit plan status','Completed, in progress, deferred, upcoming audits'],['High-risk findings','Open high/critical findings and management actions'],['Overdue actions','Ageing and escalation'],['Emerging risks','New risks from risk assessment or management input']].map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td></tr>`))}</div>`; }

function methodology(){ return header('Methodology & Templates','Reusable internal audit templates: planning memo, RCM, audit programs, report formats, follow-up validation, and risk libraries.', `<button class="btn primary">+ Template</button>`) + `<div class="panel">${table(['Template','Content'], state.templates.map(t=>`<tr><td><strong>${t[0]}</strong></td><td>${t[1]}</td></tr>`))}</div>`; }
function admin(){ return header('Administration','Configure users, roles, permissions, departments, audit ratings, retention rules, notifications, and activity logs.', `<button class="btn primary">+ User</button>`) + `<div class="grid-3">${['Roles & permissions','Departments & business units','Risk scoring model','Rating scale','Retention & archive','Activity log'].map(x=>`<div class="card"><h3>${x}</h3><p>Configure ${x.toLowerCase()} for your internal audit methodology and governance model.</p><button class="btn small ghost">Configure</button></div>`).join('')}</div>`; }

function render(){
  renderSidebar();
  const routes = { dashboard, universe, risk, annualPlan, engagements, engagementDetail, findings, reports, followup, committee, methodology, admin };
  root.innerHTML = (routes[state.view] || dashboard)();
}
render();
</script>
</body>
</html>
