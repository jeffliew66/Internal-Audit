<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura IA — Company Workspace</title>
  <style>
    body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#0b1220;color:#e5edf8;margin:0;padding:32px}
    .card{max-width:760px;margin:40px auto;padding:24px;border:1px solid #2b3854;border-radius:14px;background:#111827}
    a{color:#38bdf8}
  </style>
</head>
<body>
  <section class="card">
    <h1>Company Workspace</h1>
    <p id="clientInfo">Loading client...</p>
    <p><a href="dashboard.html">Back to Dashboard</a></p>
  </section>
  <script>
    const id = new URLSearchParams(location.search).get('clientId');
    document.getElementById('clientInfo').textContent = id ? `Opened workspace for: ${id}` : 'No client selected.';
  </script>
</body>
</html>
